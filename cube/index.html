<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cube</title>
    <script>
    </script>
    <style>
        @font-face {
            font-family: font;
            src: url(./font/Biligyar.ttf);
        }
        
        html {
            font-family: font;
            box-sizing: border-box;
        }
        
        .wrap {
            width: 100%;
            height: 40vw;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
            position: relative;
        }
        
        .can {
            width: 20vw;
            height: 20vw;
            transform-style: preserve-3d;
            position: relative;
            animation: rotate 15s infinite;
        }
        
        .can1 {
            width: 10vw;
            height: 10vw;
            transform-style: preserve-3d;
            position: relative;
            /* animation:rotate 30s infinite; */
            position: absolute;
            left: 0;
            top: 0;
            right: 0;
            bottom: 0;
            margin: auto;
        }
        
        .box {
            width: 100%;
            height: 100%;
            margin: 10px;
            text-align: center;
            line-height: 20vw;
            color: #fff;
            opacity: 0.5;
            position: absolute;
            background-size: 100% 100%!important;
            /*backface-visibility:hidden;*/
        }
        
        .box1 {
            width: 100%;
            height: 100%;
            margin: 10px;
            text-align: center;
            color: #fff;
            opacity: 0.5;
            /*backface-visibility:hidden;*/
            position: absolute;
            background-size: 100% 100%!important;
        }
        
        .box1 p {
            width: 100%;
            height: 50%;
            font-size: 12px;
        }
        
        .box-11 {
            background: #f00 100% 100%;
            transform: translateZ(5vw);
        }
        
        .box-22 {
            background: #0f0;
            transform: translateZ(-5vw) rotateY(180deg);
        }
        
        .box-33 {
            background: #00f;
            transform: rotateX(90deg) translateZ(5vw);
        }
        
        .box-44 {
            background: #ff0;
            transform: rotateY(90deg) translateZ(5vw);
        }
        
        .box-55 {
            background: #f0f;
            transform: rotateX(-90deg) translateZ(5vw);
            ;
        }
        
        .box-66 {
            background: #0ff;
            transform: rotateY(-90deg) translateZ(5vw);
        }
        
        .box-1 {
            background: url("./image/1.jpeg") no-repeat;
            transform: translateZ(10vw);
        }
        
        .box-2 {
            background: url("./image/2.jpg") no-repeat;
            transform: translateZ(-10vw) rotateY(180deg);
        }
        
        .box-3 {
            background: url("./image/3.jpg") no-repeat;
            transform: rotateX(90deg) translateZ(10vw);
        }
        
        .box-4 {
            background: url("./image/4.jpg") no-repeat;
            transform: rotateY(90deg) translateZ(10vw);
        }
        
        .box-5 {
            background: url("./image/5.jpg") no-repeat;
            transform: rotateX(-90deg) translateZ(10vw);
            ;
        }
        
        .box-6 {
            background: url("./image/6.jpg") no-repeat;
            transform: rotateY(-90deg) translateZ(10vw);
        }
        
        audio {
            position: absolute;
            left: 50%;
            bottom: 30%;
            transform: translateX(-50%);
        }
        
        @keyframes rotate {
            0% {
                transform: rotateY(0deg);
            }
            10% {
                transform: rotateY(90deg);
            }
            20% {
                transform: rotateY(180deg);
            }
            30% {
                transform: rotateY(270deg);
            }
            40% {
                transform: rotateY(360deg);
            }
            50% {
                transform: rotateY(360deg);
            }
            60% {
                transform: rotateY(360deg);
            }
            70% {
                transform: rotateY(270deg);
            }
            80% {
                transform: rotateY(180deg);
            }
            90% {
                transform: rotateY(90deg);
            }
            100% {
                transform: rotateY(0deg);
            }
        }
    </style>
</head>

<body>
    <div class="wrap">
        <!-- <audio autoplay="autoplay" loop="loop">
			<source  src="./video/tkzc.mp3" type="audio/mp3"/>
			 Your browser does not support the audio element.
		</audio> -->
        <div class="can">
            <div class="box box-1"></div>
            <div class="box box-2"></div>
            <div class="box box-3"></div>
            <div class="box box-4"></div>
            <div class="box box-5"></div>
            <div class="box box-6"></div>
            <!-- <div class="box talk" style="opacity:0.5;background:#000;font-family:font;color:#fff;font-size:12px;">hello! miss j!</div> -->
            <div class="can1">
                <div class="box1 box-11">

                </div>
                <div class="box1 box-22">

                </div>
                <div class="box1 box-33">

                </div>
                <div class="box1 box-44">

                </div>
                <div class="box1 box-55">

                </div>
                <div class="box1 box-66">

                </div>
            </div>
        </div>
    </div>
    <script>
        function speed(t) {
            var deg = 0;
            setInterval(function() {
                var can = document.getElementsByClassName("can1")[0];
                deg -= 90;
                // console.log(deg);
                can.style.transform = " rotateY(" + deg + "deg" + ")";
            }, t);
        }
        speed(1500)
    </script>
</body>

</html>
